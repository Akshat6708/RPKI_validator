<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGP RPKI Validation Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white min-h-screen">
    
    <div class="container mx-auto p-6">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                        BGP RPKI Validation Dashboard
                    </h1>
                    <p class="text-slate-400">Real-time BGP route validation monitoring</p>
                </div>
                <div class="flex items-center gap-4">
                    <!-- Connection Status -->
                    <div id="connectionStatus" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-green-500/20 text-green-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
                        </svg>
                        <span class="text-sm font-medium">Connected</span>
                    </div>

                    <!-- Last Update -->
                    <div class="flex items-center gap-2 text-sm">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span id="lastUpdate" class="text-slate-400">--:--:--</span>
                    </div>

                    <!-- Live Toggle -->
                    <button id="liveToggle" class="px-4 py-2 rounded-lg font-medium transition-all bg-green-500 hover:bg-green-600 text-white">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                            <span>Live</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700 rounded-xl p-6 hover:border-slate-600 transition-all">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-slate-400 text-sm font-medium">Total Validations</span>
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                    </svg>
                </div>
                <div id="totalCount" class="text-3xl font-bold text-blue-400">0</div>
            </div>

            <div class="bg-gradient-to-br from-green-500/10 to-green-600/10 border border-green-500/30 rounded-xl p-6 hover:border-green-500/50 transition-all">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-slate-300 text-sm font-medium">Valid Routes</span>
                    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div id="validCount" class="text-3xl font-bold text-green-400">0</div>
                <div id="validPercent" class="text-sm text-green-300/70 mt-2">0%</div>
            </div>

            <div class="bg-gradient-to-br from-red-500/10 to-red-600/10 border border-red-500/30 rounded-xl p-6 hover:border-red-500/50 transition-all">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-slate-300 text-sm font-medium">Invalid Routes</span>
                    <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div id="invalidCount" class="text-3xl font-bold text-red-400">0</div>
                <div id="invalidPercent" class="text-sm text-red-300/70 mt-2">0%</div>
            </div>

            <div class="bg-gradient-to-br from-yellow-500/10 to-yellow-600/10 border border-yellow-500/30 rounded-xl p-6 hover:border-yellow-500/50 transition-all">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-slate-300 text-sm font-medium">Not Found</span>
                    <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <div id="notFoundCount" class="text-3xl font-bold text-yellow-400">0</div>
                <div id="notFoundPercent" class="text-sm text-yellow-300/70 mt-2">0%</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 bg-slate-800/50 backdrop-blur-sm border border-slate-700 rounded-xl p-6">
                <h3 class="text-xl font-semibold mb-4 text-slate-200">Validation Trends (Last 30 min)</h3>
                <canvas id="lineChart" height="100"></canvas>
            </div>

            <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700 rounded-xl p-6">
                <h3 class="text-xl font-semibold mb-4 text-slate-200">Distribution</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- Recent Logs Table -->
        <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700 rounded-xl p-6">
            <h3 class="text-xl font-semibold mb-4 text-slate-200">Recent Validations</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-slate-700">
                            <th class="text-left py-3 px-4 text-slate-400 font-medium">Timestamp</th>
                            <th class="text-left py-3 px-4 text-slate-400 font-medium">ASN</th>
                            <th class="text-left py-3 px-4 text-slate-400 font-medium">Prefix</th>
                            <th class="text-left py-3 px-4 text-slate-400 font-medium">Max Length</th>
                            <th class="text-left py-3 px-4 text-slate-400 font-medium">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logsTable">
                        <tr>
                            <td colspan="5" class="py-8 text-center text-slate-400">
                                Loading data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let isLive = true;
        let lineChart, pieChart;
        let refreshInterval;

        // Initialize charts
        function initCharts() {
            // Line Chart
            const lineCtx = document.getElementById('lineChart').getContext('2d');
            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Valid',
                            data: [],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: 'Invalid',
                            data: [],
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: 'Not Found',
                            data: [],
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#94a3b8' } }
                    },
                    scales: {
                        y: { 
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        },
                        x: { 
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });

            // Pie Chart
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Valid', 'Invalid', 'Not Found'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#10b981', '#ef4444', '#f59e0b'],
                        borderColor: '#1e293b',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#94a3b8' } }
                    }
                }
            });
        }

        // Fetch data from backend
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data.error) {
                    updateConnectionStatus(false);
                    return;
                }

                updateConnectionStatus(true);
                updateStats(data.stats);
                updateLogs(data.logs);
                
            } catch (error) {
                console.error('Error:', error);
                updateConnectionStatus(false);
            }
        }

        // Fetch timeseries data
        async function fetchTimeseries() {
            try {
                const response = await fetch('/api/timeseries');
                const data = await response.json();
                
                if (!data.error) {
                    updateLineChart(data.timeseries);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Update stats cards
        function updateStats(stats) {
            document.getElementById('totalCount').textContent = stats.total.toLocaleString();
            document.getElementById('validCount').textContent = stats.valid.toLocaleString();
            document.getElementById('invalidCount').textContent = stats.invalid.toLocaleString();
            document.getElementById('notFoundCount').textContent = stats.notFound.toLocaleString();

            const validPercent = stats.total > 0 ? ((stats.valid / stats.total) * 100).toFixed(1) : 0;
            const invalidPercent = stats.total > 0 ? ((stats.invalid / stats.total) * 100).toFixed(1) : 0;
            const notFoundPercent = stats.total > 0 ? ((stats.notFound / stats.total) * 100).toFixed(1) : 0;

            document.getElementById('validPercent').textContent = `${validPercent}%`;
            document.getElementById('invalidPercent').textContent = `${invalidPercent}%`;
            document.getElementById('notFoundPercent').textContent = `${notFoundPercent}%`;

            // Update pie chart
            pieChart.data.datasets[0].data = [stats.valid, stats.invalid, stats.notFound];
            pieChart.update();

            // Update last update time
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        // Update line chart
        function updateLineChart(timeseries) {
            lineChart.data.labels = timeseries.map(d => d.time);
            lineChart.data.datasets[0].data = timeseries.map(d => d.valid);
            lineChart.data.datasets[1].data = timeseries.map(d => d.invalid);
            lineChart.data.datasets[2].data = timeseries.map(d => d.notFound);
            lineChart.update();
        }

        // Update logs table
        function updateLogs(logs) {
            const tbody = document.getElementById('logsTable');
            
            if (logs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-8 text-center text-slate-400">
                            No data available. Start the validator script to see live data.
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = logs.map(log => {
                const statusClass = {
                    'valid': 'text-green-500 bg-green-50',
                    'invalid': 'text-red-500 bg-red-50',
                    'not-found': 'text-yellow-500 bg-yellow-50'
                }[log.validity] || 'text-gray-500 bg-gray-50';

                return `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors">
                        <td class="py-3 px-4 text-slate-300 text-sm">${log.timestamp}</td>
                        <td class="py-3 px-4 text-slate-300 font-mono text-sm">${log.asn}</td>
                        <td class="py-3 px-4 text-slate-300 font-mono text-sm">${log.prefix}</td>
                        <td class="py-3 px-4 text-slate-300 text-sm">${log.maxLength}</td>
                        <td class="py-3 px-4">
                            <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium ${statusClass}">
                                ${log.validity.toUpperCase()}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Update connection status
        function updateConnectionStatus(connected) {
            const statusDiv = document.getElementById('connectionStatus');
            if (connected) {
                statusDiv.className = 'flex items-center gap-2 px-3 py-2 rounded-lg bg-green-500/20 text-green-400';
                statusDiv.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
                    </svg>
                    <span class="text-sm font-medium">Connected</span>
                `;
            } else {
                statusDiv.className = 'flex items-center gap-2 px-3 py-2 rounded-lg bg-red-500/20 text-red-400';
                statusDiv.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3"></path>
                    </svg>
                    <span class="text-sm font-medium">Disconnected</span>
                `;
            }
        }

        // Toggle live mode
        document.getElementById('liveToggle').addEventListener('click', function() {
            isLive = !isLive;
            
            if (isLive) {
                this.className = 'px-4 py-2 rounded-lg font-medium transition-all bg-green-500 hover:bg-green-600 text-white';
                this.innerHTML = `
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        <span>Live</span>
                    </div>
                `;
                startAutoRefresh();
            } else {
                this.className = 'px-4 py-2 rounded-lg font-medium transition-all bg-slate-700 hover:bg-slate-600 text-slate-300';
                this.innerHTML = `
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Paused</span>
                    </div>
                `;
                stopAutoRefresh();
            }
        });

        // Auto refresh functions
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                fetchData();
                fetchTimeseries();
            }, 3000);
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        // Initialize on page load
        window.onload = function() {
            initCharts();
            fetchData();
            fetchTimeseries();
            startAutoRefresh();
        };
    </script>
</body>
</html>
